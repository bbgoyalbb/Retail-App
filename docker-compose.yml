version: '3.8'

services:
  retail-app:
    build: .
    ports:
      - "8000:8000"
    environment:
      - MONGODB_URI=mongodb://mongo:27017/retail
      - JWT_SECRET=${JWT_SECRET:-change-me-in-production}
      - ORG_NAME=${ORG_NAME:-Retail Business}
    depends_on:
      - mongo
    volumes:
      - ./backend/static:/app/static
    restart: unless-stopped

  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    restart: unless-stopped

volumes:
  mongo-data:
