version: '3.8'

services:
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - retail-app
    restart: unless-stopped

  retail-app:
    build: .
    # Port removed - only accessible via nginx reverse proxy
    environment:
      - MONGODB_URI=mongodb://mongo:27017/retail
      - JWT_SECRET=${JWT_SECRET}
      - ORG_NAME=${ORG_NAME:-Retail Business}
    depends_on:
      - mongo
    volumes:
      - ./backend/static:/app/static
    restart: unless-stopped

  mongo:
    image: mongo:7
    # Port removed to prevent exposure to host - only accessible within Docker network
    volumes:
      - mongo-data:/data/db
    restart: unless-stopped

volumes:
  mongo-data:
